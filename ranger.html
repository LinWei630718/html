<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無個性戰隊</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; }
        /* 響應式容器設定 */
        #player-container {
            width: 90%;
            max-width: 800px;
            aspect-ratio: 4 / 3; /* 保持 Flash 經典比例 */
            background: #000;
            border: 2px solid #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        ruffle-player {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <h2>無個性戰隊</h2>
    
    <div id="player-container"></div>

    <!-- 載入 Ruffle JS (最新穩定版) -->
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.addEventListener("DOMContentLoaded", () => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            const container = document.getElementById("player-container");
            container.appendChild(player);
            
            // Ruffle 播放器配置
            player.config = {
                letterbox: "on",
                autoplay: "on",
                unmuteOverlay: "visible",
            };

            // 修正為 HTTPS 連結，避免 Mixed Content 錯誤
            const swfUrl = "https://linwei630718.github.io/html/ranger.swf";
            
            player.load(swfUrl).then(() => {
                console.log("Flash 內容已成功載入");
            }).catch((e) => {
                console.error("載入失敗，可能是 CORS 或檔案路徑問題：", e);
            });
        });
    </script>

</body>
</html>
