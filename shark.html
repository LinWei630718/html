<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>飢餓鯊魚 — Hungry Shark</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;background:radial-gradient(ellipse at center,#001833 0%,#000408 100%);display:flex;align-items:center;justify-content:center;font-family:'Noto Sans TC',sans-serif;overflow:hidden;touch-action:none}
#gw{position:relative}
canvas{display:block;border-radius:12px;box-shadow:0 0 80px rgba(0,150,255,.5),0 0 20px rgba(0,70,180,.9)}
#ui{position:absolute;top:0;left:0;width:100%;pointer-events:none;padding:8px 12px;z-index:2}
.barRow{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.barIcon{font-size:13px;line-height:1;user-select:none}
.barWrap{flex:0 0 auto;height:13px;background:rgba(0,0,0,.55);border-radius:7px;border:1.5px solid rgba(255,255,255,.55);overflow:hidden;width:clamp(100px,22vw,190px)}
#hpFill,#hungerFill{height:100%;border-radius:5px;transition:width .15s}
#hpFill{background:linear-gradient(90deg,#ff2222,#ff8800)}
#hungerFill{background:linear-gradient(90deg,#ffe000,#ff9900)}
#scoreBox{position:absolute;top:8px;right:10px;text-align:right;color:#fff;text-shadow:0 2px 6px #000;z-index:2;pointer-events:none}
#scoreDisp{font-weight:900;color:#ffe000;text-shadow:0 0 15px #ff8800,0 2px 4px #000;font-size:clamp(16px,3.5vw,26px)}
#levelDisp{font-weight:700;color:#aef;margin-top:1px;font-size:clamp(10px,1.6vw,13px)}
#comboDisp{font-weight:900;color:#ff4;min-height:18px;text-shadow:0 0 10px #f80;font-size:clamp(12px,2.2vw,17px)}
#evoBar{position:absolute;bottom:6px;left:10px;right:10px;z-index:2;pointer-events:none}
#evoLabel{color:#fff;font-weight:700;margin-bottom:2px;text-shadow:0 1px 3px #000;font-size:clamp(9px,1.4vw,11px)}
#evoProg{width:100%;height:9px;background:rgba(0,0,0,.5);border-radius:5px;border:1.5px solid rgba(255,255,255,.4);overflow:hidden}
#evoFill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,#00e5ff,#7b2fff);transition:width .3s}
#depthMeter{position:absolute;right:10px;bottom:22px;color:rgba(255,255,255,.45);font-weight:700;text-shadow:0 1px 3px #000;z-index:2;pointer-events:none;font-size:clamp(8px,1.2vw,10px)}
#missionBox{position:absolute;top:55px;left:10px;background:rgba(0,0,0,.6);border:1.5px solid rgba(0,220,255,.4);border-radius:8px;padding:5px 8px;pointer-events:none;z-index:2;min-width:130px;max-width:clamp(120px,22vw,180px)}
#missionTitle{color:#00e5ff;font-size:clamp(9px,1.3vw,11px);font-weight:900;margin-bottom:3px}
.mq{color:#fff;font-size:clamp(8px,1.2vw,10px);display:flex;justify-content:space-between;gap:6px;margin-bottom:1px}
.mq span:last-child{color:#ffe000;font-weight:700}
#dpad{position:absolute;bottom:30px;left:12px;z-index:5;display:none;user-select:none;width:132px;height:132px}
#dpad button{position:absolute;width:44px;height:44px;background:rgba(255,255,255,.18);border:2px solid rgba(255,255,255,.4);border-radius:50%;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-user-select:none;user-select:none;touch-action:none;transition:background .1s}
#dpad button:active,#dpad button.pressed{background:rgba(255,255,255,.45)}
#dpad-up{top:0;left:44px}#dpad-down{top:88px;left:44px}#dpad-left{top:44px;left:0}#dpad-right{top:44px;left:88px}
#overlay,#victoryOverlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;z-index:20;backdrop-filter:blur(5px);padding:16px;overflow-y:auto}
#overlay{background:rgba(0,6,22,.94)}
#victoryOverlay{background:radial-gradient(ellipse,rgba(80,0,120,.95),rgba(0,0,30,.98));display:none}
.ovTitle{font-weight:900;color:#00e5ff;text-shadow:0 0 40px #00e5ff,0 0 80px #0066ff,0 4px 8px #000;letter-spacing:3px;margin-bottom:5px;animation:tp 2s ease-in-out infinite;font-size:clamp(26px,7vw,52px);text-align:center}
@keyframes tp{0%,100%{text-shadow:0 0 40px #00e5ff,0 0 80px #0066ff,0 4px 8px #000}50%{text-shadow:0 0 60px #00ffff,0 0 120px #00aaff,0 4px 8px #000}}
.sub{color:#ffe000;margin-bottom:5px;letter-spacing:2px;font-size:clamp(12px,2.2vw,17px);text-align:center}
.ver{color:rgba(255,255,255,.35);margin-bottom:16px;font-size:clamp(9px,1.4vw,11px);text-align:center}
.btn{background:linear-gradient(135deg,#00e5ff,#0055ff);color:#fff;border:none;padding:11px 36px;font-weight:900;border-radius:50px;cursor:pointer;font-family:inherit;box-shadow:0 4px 25px rgba(0,180,255,.6);transition:transform .15s,box-shadow .15s;letter-spacing:1px;font-size:clamp(13px,2.2vw,17px)}
.btn:hover,.btn:active{transform:scale(1.07);box-shadow:0 6px 35px rgba(0,200,255,.85)}
.btn.red{background:linear-gradient(135deg,#ff4400,#cc0000)}
.ctrls{color:rgba(255,255,255,.5);margin-top:12px;line-height:1.9;text-align:center;font-size:clamp(9px,1.4vw,12px)}
.ctrls span{color:#ffe000}
.hsLine{color:#ffe000;margin-top:8px;font-weight:700;font-size:clamp(11px,1.8vw,14px);text-align:center}
#evoFlash{position:absolute;inset:0;pointer-events:none;opacity:0;z-index:15;border-radius:12px;transition:opacity .05s}
.statGrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin:8px 0 12px;font-size:clamp(10px,1.5vw,12px)}
.sl{color:rgba(255,255,255,.5)}.sv{color:#ffe000;font-weight:700}
#vTitle{font-size:clamp(24px,6vw,48px);font-weight:900;color:#ff44ff;text-shadow:0 0 40px #ff00ff,0 0 80px #aa00ff;letter-spacing:2px;animation:vp 1.5s ease-in-out infinite;margin-bottom:6px;text-align:center}
@keyframes vp{0%,100%{text-shadow:0 0 40px #ff44ff,0 0 80px #aa00ff}50%{text-shadow:0 0 70px #ff88ff,0 0 140px #cc44ff}}
#vDesc{color:rgba(255,255,255,.7);font-size:clamp(10px,1.5vw,13px);margin-bottom:10px;text-align:center;line-height:1.7}
.vStat{color:#aef;font-size:clamp(11px,1.8vw,14px);margin:2px 0;text-align:center}
.vStat b{color:#ffe000}
#vStars{font-size:clamp(22px,5vw,38px);margin:6px 0;letter-spacing:4px;text-align:center}
#vCanvas{border-radius:8px;margin-bottom:8px;max-width:100%}
</style>
</head>
<body>
<div id="gw">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="barRow"><span class="barIcon">❤️</span><div class="barWrap"><div id="hpFill" style="width:100%"></div></div></div>
    <div class="barRow"><span class="barIcon">🍖</span><div class="barWrap"><div id="hungerFill" style="width:100%"></div></div></div>
  </div>
  <div id="scoreBox">
    <div id="scoreDisp">0</div>
    <div id="levelDisp">小白鯊</div>
    <div id="comboDisp"></div>
  </div>
  <div id="missionBox">
    <div id="missionTitle">📋 今日任務</div>
    <div class="mq" id="mq1"><span></span><span></span></div>
    <div class="mq" id="mq2"><span></span><span></span></div>
    <div class="mq" id="mq3"><span></span><span></span></div>
  </div>
  <div id="evoBar">
    <div id="evoLabel">進化進度 ▶</div>
    <div id="evoProg"><div id="evoFill"></div></div>
  </div>
  <div id="depthMeter"></div>
  <div id="evoFlash"></div>
  <div id="dpad">
    <button id="dpad-up">▲</button><button id="dpad-down">▼</button>
    <button id="dpad-left">◀</button><button id="dpad-right">▶</button>
  </div>
  <div id="overlay">
    <div class="ovTitle">🦈 飢餓鯊魚</div>
    <div class="sub">HUNGRY SHARK</div>
    <div class="ver">超強進化版 v3.1 · RWD · 任務系統</div>
    <button class="btn" onclick="startGame()">▶ 開始遊戲</button>
    <div class="ctrls">
      ← → ↑ ↓ <span>方向鍵</span> / 手機 <span>虛擬搖桿</span><br>
      吞噬水中生物、海面人類以<span>進化成長</span><br>
      💣炸彈 🗑️垃圾 🎐水母 🔫武裝人類 ▶ <span>損傷</span><br>
      🐙章魚 🦈敵鯊 🐋巨鯨 🚢船艦 · <span>連擊加分 · 每日任務</span><br>
      <span style="color:#ff88ff">進化成巨齒鯊 → 挑戰深海Boss！</span>
    </div>
    <div class="hsLine" id="hsDisp"></div>
  </div>
  <div id="victoryOverlay">
    <canvas id="vCanvas" width="280" height="100"></canvas>
    <div id="vTitle">🏆 稱霸海洋！</div>
    <div id="vDesc"></div>
    <div id="vStars"></div>
    <div id="vStatBlock"></div>
    <div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn" onclick="startGame()">▶ 再玩一次</button>
      <button class="btn red" onclick="showMainMenu()">🏠 主選單</button>
    </div>
  </div>
</div>
<script>
// ════════════════════════════════════
//  RWD SCALING
// ════════════════════════════════════
const GW=800,GH=520;
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
canvas.width=GW;canvas.height=GH;
let SCALE=1;
function resizeGame(){
  SCALE=Math.min(window.innerWidth/GW,window.innerHeight/GH,1.4);
  const g=document.getElementById('gw');
  g.style.width=GW*SCALE+'px';g.style.height=GH*SCALE+'px';
  canvas.style.width=GW*SCALE+'px';canvas.style.height=GH*SCALE+'px';
  document.getElementById('dpad').style.display=(window.innerWidth<900||'ontouchstart' in window)?'block':'none';
}
window.addEventListener('resize',resizeGame);resizeGame();
const W=GW,H=GH,WORLD_W=3600,SEA_Y=130;

// ════════════════════════════════════
//  WEB AUDIO
// ════════════════════════════════════
let AC=null;
function getAC(){
  if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();
  // resume if suspended (browser autoplay policy)
  if(AC.state==='suspended')AC.resume();
  return AC;
}
function tone(freq,type,dur,vol=0.15,fe=null){
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=type;
    o.frequency.setValueAtTime(Math.max(10,freq),a.currentTime);
    if(fe!=null&&fe>0)o.frequency.exponentialRampToValueAtTime(Math.max(10,fe),a.currentTime+dur);
    g.gain.setValueAtTime(0,a.currentTime);
    g.gain.linearRampToValueAtTime(Math.min(1,vol),a.currentTime+0.005);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+Math.max(0.01,dur));
    o.start(a.currentTime);o.stop(a.currentTime+Math.max(0.01,dur));
  }catch(e){}
}
function noise(dur,vol=0.1,hp=200){
  try{
    const a=getAC();
    const len=Math.max(1,Math.ceil(a.sampleRate*dur));
    const buf=a.createBuffer(1,len,a.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1);
    const src=a.createBufferSource();src.buffer=buf;
    const f=a.createBiquadFilter();f.type='highpass';f.frequency.value=hp;
    const g=a.createGain();
    g.gain.setValueAtTime(Math.min(1,vol),a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+Math.max(0.01,dur));
    src.connect(f);f.connect(g);g.connect(a.destination);
    src.start(a.currentTime);src.stop(a.currentTime+Math.max(0.01,dur));
  }catch(e){}
}
const SFX={
  eat:     ()=>{tone(300,'sawtooth',.1,.2,160);noise(.05,.07,500);},
  eatBig:  ()=>{tone(160,'sawtooth',.22,.35,80);noise(.12,.18,180);},
  hurt:    ()=>{tone(75,'square',.2,.3,45);noise(.18,.22,80);},
  bomb:    ()=>{tone(55,'sawtooth',.4,.5,18);noise(.35,.4,40);},
  shoot:   ()=>{tone(1100,'square',.05,.07,500);},
  bullet:  ()=>{tone(75,'square',.15,.25,40);noise(.12,.18,90);},
  bite:    ()=>{tone(200,'square',.07,.18,100);},
  evo:     ()=>{[180,270,400,560,750,1000].forEach((f,i)=>setTimeout(()=>tone(f,'sine',.35,.25),i*90));},
  combo:   (n)=>{tone(Math.min(380+n*80,1500),'triangle',.12,.2);},
  warn:    ()=>{tone(420,'square',.09,.12);},
  death:   ()=>{tone(90,'sawtooth',.6,.4,25);setTimeout(()=>tone(55,'sine',1.0,.25,18),250);},
  victory: ()=>{[300,400,500,600,800,1000,1300].forEach((f,i)=>setTimeout(()=>{tone(f,'sine',.4,.25);tone(f*1.5,'triangle',.3,.12);},i*120));},
  boss:    ()=>{tone(60,'sawtooth',.5,.35,30);noise(.4,.28,50);},
  levelup: ()=>{[400,500,650].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.2,.18),i*80));},
  coin:    ()=>{tone(800,'sine',.08,.15,1200);},
  power:   ()=>{tone(600,'sine',.15,.2,900);tone(900,'triangle',.1,.1);},
};

// ════════════════════════════════════
//  CONSTANTS
// ════════════════════════════════════
const SHARKS=[
  {name:'小白鯊',color:'#b8cfe0',belly:'#deeeff',size:22,speed:3.2,evoScore:300,  maxHp:100,glow:null},
  {name:'藍鯊',  color:'#3377ee',belly:'#aaccff',size:33,speed:3.6,evoScore:900,  maxHp:160,glow:'#4499ff'},
  {name:'虎鯊',  color:'#d99020',belly:'#ffe8aa',size:46,speed:4.0,evoScore:2200, maxHp:240,glow:'#ffaa00'},
  {name:'大白鯊',color:'#cccccc',belly:'#f0f0f0',size:62,speed:4.4,evoScore:5000, maxHp:350,glow:'#00e5ff'},
  {name:'巨齒鯊',color:'#5522aa',belly:'#cc99ff',size:84,speed:4.9,evoScore:99999,maxHp:550,glow:'#aa00ff'},
];

// eatRequiredStage[type] = minimum shark stage to eat that entity
const EAT_STAGE={fish:0,crab:1,turtle:2,human:0,octo:2,eshark:2,whale:4,boat:3,boss:4};

const MISSION_POOL=[
  {id:'m_fish',  desc:'吞噬50隻魚',      target:50,  type:'fish',   reward:200},
  {id:'m_human', desc:'吞噬10個人類',     target:10,  type:'human',  reward:300},
  {id:'m_whale', desc:'吞噬3頭鯨魚',      target:3,   type:'whale',  reward:500},
  {id:'m_score', desc:'累積1000分',       target:1000,type:'score',  reward:150},
  {id:'m_combo', desc:'達成8連擊',        target:8,   type:'combo',  reward:250},
  {id:'m_boat',  desc:'擊沉5艘船',        target:5,   type:'boat',   reward:400},
  {id:'m_octo',  desc:'吞噬8隻章魚',      target:8,   type:'octo',   reward:350},
  {id:'m_surv',  desc:'存活5分鐘',        target:300, type:'survive',reward:200},
];

// ════════════════════════════════════
//  STATE
// ════════════════════════════════════
let sk,ents,parts,bloods,floats,
    score,running,keys={}, // init so keydown before startGame does not crash
    camX,shakeX,shakeY,shakeT,
    combo,comboT,maxCombo,
    highScore=0,
    gT,warnF,lastWarnT,bgBubs,
    missions,missionCounts,
    totalEaten,bossSpawned,bossDefeated,
    multiplier,multiTimer;

function initState(){
  sk={
    x:400,y:310,vx:0,vy:0,
    stage:0,
    hp:SHARKS[0].maxHp,maxHp:SHARKS[0].maxHp,
    hunger:100,
    facingLeft:false,
    invincible:0,flashT:0,
    evoPoints:0,
    tailA:0,tailDir:1,mouthOpen:0,
    // FIX: initialise powerup timers to 0 (was undefined before)
    speedBoost:0,shield:0,
    // FIX: track hit-cooldown per entity to prevent per-frame damage
    hitCD:{}
  };
  ents=[];parts=[];bloods=[];floats=[];
  score=0;camX=0;shakeX=0;shakeY=0;shakeT=0;
  combo=0;comboT=0;maxCombo=0;
  gT=0;warnF=0;lastWarnT=0;
  bossSpawned=false;bossDefeated=false;
  totalEaten=0;multiplier=1;multiTimer=0;
  keys={dU:false,dD:false,dL:false,dR:false};
  missionCounts={};
  bgBubs=[];
  for(let i=0;i<40;i++)bgBubs.push({x:rnd(0,WORLD_W),y:rnd(SEA_Y+10,H-5),vy:rnd(-.35,-.08),sz:rnd(2,7),a:rnd(.1,.3)});
  pickMissions();
  spawn0();
}

// ════════════════════════════════════
//  HELPERS
// ════════════════════════════════════
function rnd(a,b){return a+Math.random()*(b-a);}
function ri(a,b){return Math.floor(rnd(a,b+1));}
function dst(a,b){const dx=a.x-b.x,dy=a.y-b.y;return Math.sqrt(dx*dx+dy*dy);}
// safe normalize — returns [0,0] if zero vector to avoid NaN
function norm(dx,dy){const l=Math.sqrt(dx*dx+dy*dy)||1;return[dx/l,dy/l];}

// ════════════════════════════════════
//  MISSIONS
// ════════════════════════════════════
function pickMissions(){
  const pool=[...MISSION_POOL];
  for(let i=pool.length-1;i>0;i--){const j=ri(0,i);[pool[i],pool[j]]=[pool[j],pool[i]];}
  missions=pool.slice(0,3).map(m=>({...m,done:false}));
  missions.forEach(m=>{missionCounts[m.id]=0;});
  renderMissions();
}
function renderMissions(){
  missions.forEach((m,i)=>{
    const el=document.getElementById('mq'+(i+1));
    if(!el)return;
    const cur=missionCounts[m.id]||0;
    const prog=m.type==='score'?Math.min(100,Math.floor(cur/m.target*100))+'%':`${Math.floor(Math.min(cur,m.target))}/${m.target}`;
    el.children[0].textContent=(m.done?'✅ ':'📌 ')+m.desc;
    el.children[1].textContent=m.done?'+'+m.reward+'✓':prog;
  });
}
function trackMission(type,val){
  missions.forEach(m=>{
    if(m.done)return;
    if(m.type===type){
      if(type==='combo') missionCounts[m.id]=Math.max(missionCounts[m.id]||0,val);
      else missionCounts[m.id]=(missionCounts[m.id]||0)+val;
    }
    if(m.type==='score') missionCounts[m.id]=score;
    if(!m.done&&missionCounts[m.id]>=m.target){
      m.done=true;
      score+=m.reward;
      flt('✅ 任務完成 +'+m.reward,W/2,H*0.4,'#00ff88',22);
      SFX.levelup();
      boom(sk.x,sk.y,'#00ff88',20);
    }
  });
}

// ════════════════════════════════════
//  SPAWNERS
// ════════════════════════════════════
const FCOLS=['#ff6b6b','#ffd700','#7fff00','#00ced1','#ff69b4','#ff8c00','#adff2f','#1e90ff','#ff4500','#9932cc','#00fa9a','#ff6347'];
let _eid=0;
function eid(){return ++_eid;}

function spF(){ents.push({id:eid(),t:'fish',  x:rnd(200,WORLD_W-200),y:rnd(SEA_Y+18,H-30),  vx:rnd(-1.9,1.9)||.7,vy:0,  sz:rnd(7,20), col:FCOLS[ri(0,11)],hp:1, sc:10, alive:1,aT:rnd(0,6)});}
function spJ(){ents.push({id:eid(),t:'jelly', x:rnd(200,WORLD_W-200),y:rnd(SEA_Y+28,H-45),  vx:rnd(-.5,.5)||.3, vy:rnd(-.2,.2),sz:rnd(14,26),             hp:1, sc:15, alive:1,aT:rnd(0,6)});}
function spC(){ents.push({id:eid(),t:'crab',  x:rnd(200,WORLD_W-200),y:H-22,                vx:rnd(-1,1)||.5,              sz:17,                           hp:2, sc:25, alive:1,aT:0});}
function spTu(){ents.push({id:eid(),t:'turtle',x:rnd(200,WORLD_W-200),y:rnd(SEA_Y+40,H-50), vx:rnd(-.7,.7)||.4, vy:0,    sz:26,                           hp:3, sc:35, alive:1,aT:0});}
function spOc(){ents.push({id:eid(),t:'octo',  x:rnd(200,WORLD_W-200),y:rnd(SEA_Y+60,H-55), vx:rnd(-.4,.4)||.3,           sz:30,                           hp:4, sc:65, alive:1,aT:rnd(0,6)});}
function spES(){ents.push({id:eid(),t:'eshark',x:rnd(200,WORLD_W-200),y:rnd(SEA_Y+40,H-55), vx:rnd(-1.6,1.6)||1,vy:0,    sz:29,                           hp:5, sc:80, alive:1,aT:0,fl:false});}

function spawn0(){
  for(let i=0;i<22;i++)spF();
  for(let i=0;i<7;i++) spJ();
  for(let i=0;i<5;i++) spH();
  for(let i=0;i<5;i++) spBm();
  for(let i=0;i<5;i++) spTr();

function maintain(){
  const c={};
  for(const e of ents)if(e.alive)c[e.t]=(c[e.t]||0)+1;
  if((c.fish  ||0)<18)spF();
  if((c.jelly ||0)<5) spJ();
  if((c.human ||0)<4) spH();
  if((c.bomb  ||0)<4) spBm();
  if((c.trash ||0)<4) spTr();
  if((c.crab  ||0)<3) spC();
  if((c.turtle||0)<3) spTu();
  if((c.octo  ||0)<2) spOc();
  if((c.eshark||0)<2&&sk.stage<4)spES();
  if(!(c.whale||0))   spWh();
  if(!(c.boat ||0))   spBt();
  if((c.coin  ||0)<3) spCoin();
  if((c.power ||0)<2&&Math.random()<.015)spPow(Math.random()<.5?'speed':'shield');
}

function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('victoryOverlay').style.display='none';
  running=true;
  firstFrame=true; // FIX: reset so first frame gets dt=0
  initState();
  requestAnimationFrame(loop);
}
function showMainMenu(){
  running=false;
  document.getElementById('victoryOverlay').style.display='none';
  const ov=document.getElementById('overlay');
  // FIX: rebuild overlay HTML with static structure so IDs exist
  ov.innerHTML=`
    <div class="ovTitle">🦈 飢餓鯊魚</div>
    <div class="sub">HUNGRY SHARK</div>
    <div class="ver">超強進化版 v3.1</div>
    <button class="btn" onclick="startGame()">▶ 開始遊戲</button>
    <div class="ctrls">
      ← → ↑ ↓ <span>方向鍵</span> / 手機 <span>虛擬搖桿</span><br>
      吞噬生物以<span>進化成長</span> · 💣🗑️🎐🔫 <span>危險</span><br>
      🐙章魚 🦈敵鯊 🐋巨鯨 🚢船 · <span>連擊 · 每日任務 · Boss</span><br>
      <span style="color:#ff88ff">進化成巨齒鯊 → 挑戰深海Boss！</span>
    </div>
    <div class="hsLine">${highScore>0?'🏆 最高紀錄：'+highScore:''}</div>
  `;
  ov.style.display='flex';
}
let lt=0,firstFrame=true;
function loop(ts){
  if(!running)return;
  if(firstFrame){lt=ts;firstFrame=false;} // FIX: prevent huge dt on first frame
  const dt=Math.min((ts-lt)/16.67,3);
  lt=ts;
  try{
    update(dt);
    draw();
  }catch(err){
    // FIX: catch silent JS errors that would cause black screen with no feedback
    console.error('Game loop error:',err);
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#000a1a';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4444';ctx.font='bold 18px sans-serif';ctx.textAlign='center';
    ctx.fillText('遊戲發生錯誤，請重新開始',W/2,H/2);
    running=false;
    setTimeout(()=>{document.getElementById('overlay').style.display='flex';},1500);
    return;
  }
  requestAnimationFrame(loop);
}

// ════════════════════════════════════
//  UPDATE
// ════════════════════════════════════
function update(dt){
  gT+=dt;

  const s=SHARKS[sk.stage];

  // — input —
  let ax=0,ay=0;
  if(keys['ArrowLeft'] ||keys['a']||keys['A']||keys.dL)ax=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']||keys.dR)ax=1;
  if(keys['ArrowUp']   ||keys['w']||keys['W']||keys.dU)ay=-1;
  if(keys['ArrowDown'] ||keys['s']||keys['S']||keys.dD)ay=1;

  // — shark physics —
  sk.vx+=ax*0.58*dt; sk.vy+=ay*0.58*dt;
  if(sk.y<SEA_Y+8)sk.vy+=0.22*dt;
  sk.vx*=Math.pow(0.87,dt); sk.vy*=Math.pow(0.87,dt);
  const spd=s.speed*(sk.speedBoost>0?1.5:1);
  const vel=Math.sqrt(sk.vx**2+sk.vy**2);
  if(vel>spd){sk.vx*=spd/vel;sk.vy*=spd/vel;}
  sk.x+=sk.vx*dt; sk.y+=sk.vy*dt;
  if(ax<0)sk.facingLeft=true; if(ax>0)sk.facingLeft=false;
  sk.x=Math.max(s.size,Math.min(WORLD_W-s.size,sk.x));
  sk.y=Math.max(SEA_Y+4,Math.min(H-s.size*.5,sk.y));

  // — tail & mouth —
  sk.tailA+=sk.tailDir*0.13*dt*(vel+.5);
  if(Math.abs(sk.tailA)>.48)sk.tailDir*=-1;
  let nearPrey=false;
  for(const e of ents){
    if(!e.alive)continue;
    if(EAT_STAGE[e.t]!=null&&dst(sk,e)<s.size*2.8){nearPrey=true;break;}
  }
  sk.mouthOpen=nearPrey?Math.min(1,sk.mouthOpen+.09*dt):Math.max(0,sk.mouthOpen-.07*dt);

  // — powerup timers —
  if(sk.speedBoost>0)sk.speedBoost=Math.max(0,sk.speedBoost-dt);
  if(sk.shield>0)    sk.shield    =Math.max(0,sk.shield-dt);

  // — hit cooldowns per entity (prevents per-frame damage) —
  for(const k in sk.hitCD){sk.hitCD[k]=Math.max(0,(sk.hitCD[k]||0)-dt);}

  // — camera —
  camX=Math.max(0,Math.min(WORLD_W-W,sk.x-W/2));
  if(shakeT>0){shakeT-=dt;shakeX=(Math.random()*2-1)*shakeT*1.6;shakeY=(Math.random()*2-1)*shakeT*1.4;}
  else{shakeX=0;shakeY=0;}

  // — hunger —
  sk.hunger-=0.045*dt;
  if(sk.hunger<=0){
    sk.hunger=0;sk.hp-=0.16*dt;
    if(gT-lastWarnT>120){SFX.warn();lastWarnT=gT;}
    if(sk.hp<=0){sk.hp=0;SFX.death();endGame();return;}
  }
  warnF=(sk.hunger<25)?(warnF+0.1*dt)%(Math.PI*2):0;

  // — invincibility & flash —
  if(sk.invincible>0)sk.invincible-=dt;
  if(sk.flashT>0)    sk.flashT    -=dt;

  // — combo timer —
  if(comboT>0)comboT-=dt;
  else if(combo>0){combo=0;document.getElementById('comboDisp').textContent='';}

  // — score multiplier —
  if(multiTimer>0)multiTimer-=dt;
  else multiplier=1;

  // — mission timers —
  missions.forEach(m=>{
    if(m.done)return;
    if(m.type==='survive'){missionCounts[m.id]=(missionCounts[m.id]||0)+dt;if(missionCounts[m.id]>=m.target){m.done=true;score+=m.reward;flt('✅ 任務完成 +'+m.reward,W/2,H*.4,'#00ff88',22);SFX.levelup();}}
    if(m.type==='score')   missionCounts[m.id]=score;
  });

  // — boss spawn —
  if(sk.stage===4&&!bossSpawned)spawnBoss();

  // ══ ENTITY UPDATE + COLLISION ══
  for(const e of ents){
    if(!e.alive)continue;
    e.aT=(e.aT||0)+0.07*dt;

    // — movement —
    switch(e.t){
      case 'fish':
        e.x+=e.vx*dt; e.y+=Math.sin(e.aT)*.38*dt;
        if(e.x<10||e.x>WORLD_W-10)e.vx*=-1;
        e.y=Math.max(SEA_Y+8,Math.min(H-8,e.y));
        break;
      case 'jelly':
        e.x+=e.vx*dt; e.y+=(Math.sin(e.aT*.6)*.4+e.vy)*dt;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        e.y=Math.max(SEA_Y+14,Math.min(H-10,e.y));
        break;
      case 'crab':
        e.x+=e.vx*dt; e.y=H-22;
        if(e.x<10||e.x>WORLD_W-10)e.vx*=-1;
        break;
      case 'turtle':
        e.x+=e.vx*dt; e.y+=Math.sin(e.aT*.5)*.2*dt;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        e.y=Math.max(SEA_Y+18,Math.min(H-16,e.y));
        break;
      case 'octo':
        e.x+=Math.sin(e.aT*.4)*.85*dt;
        e.y+=Math.cos(e.aT*.3)*.52*dt;
        e.x=Math.max(80,Math.min(WORLD_W-80,e.x));
        e.y=Math.max(SEA_Y+28,Math.min(H-22,e.y));
        break;
      case 'eshark':{
        const[nx,ny]=norm(sk.x-e.x,sk.y-e.y);
        const ed2=dst(e,sk);
        if(ed2<260&&sk.stage<4){e.vx+=nx*.045*dt;e.vy+=ny*.022*dt;}
        e.vx*=Math.pow(.95,dt);e.vy*=Math.pow(.95,dt);
        const ev=Math.sqrt(e.vx**2+e.vy**2);if(ev>2){e.vx*=2/ev;e.vy*=2/ev;}
        e.x+=e.vx*dt;e.y+=e.vy*dt;
        e.fl=e.vx<0;
        e.x=Math.max(80,Math.min(WORLD_W-80,e.x));
        e.y=Math.max(SEA_Y+18,Math.min(H-22,e.y));
        // eshark attacks player
        if(ed2<e.sz+s.size&&sk.invincible<=0&&sk.shield<=0&&!(sk.hitCD[e.id]>0)){
          sk.hitCD[e.id]=60;
          if(hurt(28,'🦈 被鯊魚咬！',e.x,e.y))return;
        }
        break;
      }
      case 'whale':
        e.x+=e.vx*dt; e.y+=Math.sin(e.aT*.2)*.32*dt;
        if(e.x<200||e.x>WORLD_W-200)e.vx*=-1;
        e.y=Math.max(SEA_Y+50,Math.min(H-70,e.y));
        break;
      case 'boat':
        e.x+=e.vx*dt; e.y=SEA_Y-22;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        e.sc2=(e.sc2||rnd(60,120))-dt;
        if(e.sc2<=0){
          const bd=sk.x-e.x,bdy=sk.y-e.y;
          if(Math.sqrt(bd*bd+bdy*bdy)<360){spBul(e.x,e.y+10,sk.x,sk.y);spBul(e.x+20,e.y+10,sk.x,sk.y);}
          e.sc2=rnd(90,180);
        }
        break;
      case 'human':
        e.x+=e.vx*dt; e.y=SEA_Y-14;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        if(e.arm){
          e.sT-=dt;
          if(e.sT<=0){
            const hd=Math.sqrt((sk.x-e.x)**2+(sk.y-e.y)**2);
            if(hd<330)spBul(e.x,e.y,sk.x,sk.y);
            e.sT=rnd(80,190);
          }
        }
        break;
      case 'bul':
        e.x+=e.vx*dt;e.y+=e.vy*dt;e.life-=dt;
        if(e.life<=0||e.y<SEA_Y-20||e.y>H+20||e.x<-20||e.x>WORLD_W+20)e.alive=0;
        break;
      case 'bomb':
        e.x+=e.vx*dt;e.y+=e.vy*dt;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        e.y=Math.max(SEA_Y+10,Math.min(H-10,e.y));
        break;
      case 'trash':
        e.x+=e.vx*dt;e.y+=e.vy*dt;
        if(e.x<80||e.x>WORLD_W-80)e.vx*=-1;
        e.y=Math.max(SEA_Y+10,Math.min(H-10,e.y));
        break;
      case 'coin':
        e.y+=Math.sin(e.aT)*.4*dt;
        e.y=Math.max(SEA_Y+12,Math.min(H-12,e.y));
        break;
      case 'power':
        e.aT2=(e.aT2||0)+0.06*dt;
        e.y+=Math.sin(e.aT*.8)*.5*dt;
        e.y=Math.max(SEA_Y+14,Math.min(H-14,e.y));
        break;
      case 'boss':
        updateBoss(e,dt);
        break;
    }

    // — collision with shark —
    // bullets handled separately
    if(e.t==='bul'){
      if(!e.alive)continue;
      if(dst(sk,e)<s.size*.8&&sk.invincible<=0&&sk.shield<=0){
        e.alive=0;SFX.bullet();
        if(hurt(23,'🔫 中彈！',e.x,e.y))return; // game over — stop processing
      }
      continue;
    }

    if(!e.alive)continue; // entity may have died in movement (eshark hurt)
    if(!running)return;   // game ended mid-loop (e.g. eshark killed us)
    const d=dst(sk,e);
    const eatR=s.size*.85+(e.sz||12);
    if(d>eatR)continue;

    // — hazards (damage player) —
    if(e.t==='bomb'&&sk.invincible<=0&&sk.shield<=0&&!(sk.hitCD[e.id]>0)){
      e.alive=0;SFX.bomb();shake(14);
      boom(e.x,e.y,'#ff8800',26);boom(e.x,e.y,'#ffdd00',15);
      if(hurt(42,'💥 炸彈！',e.x,e.y))return;
      continue;
    }
    if(e.t==='trash'&&sk.invincible<=0&&sk.shield<=0&&!(sk.hitCD[e.id]>0)){
      e.alive=0;SFX.hurt();
      if(hurt(18,'🗑️ 垃圾！',e.x,e.y))return;
      continue;
    }
    if(e.t==='jelly'&&sk.invincible<=0&&sk.shield<=0&&!(sk.hitCD[e.id]>0)){
      e.alive=0;SFX.hurt();
      if(hurt(21,'🎐 水母蜇！',e.x,e.y))return;
      continue;
    }
    if(e.t==='boss'&&d<e.sz+s.size*.6&&sk.invincible<=0&&sk.shield<=0&&!(sk.hitCD[e.id]>0)){
      sk.hitCD[e.id]=60;
      if(hurt(e.phase===2?50:35,'👹 Boss攻擊！',e.x,e.y))return;
      continue;
    }

    // — collectibles —
    if(e.t==='coin'&&d<s.size*.9){
      e.alive=0;const pts=30*multiplier;score+=pts;
      flt('+'+pts+' 💰',e.x-camX,e.y,'#ffd700',16);
      sparks(e.x,e.y,'#ffd700',6);SFX.coin();
      continue;
    }
    if(e.t==='power'&&d<s.size*.9){
      e.alive=0;
      if(e.kind==='speed'){sk.speedBoost=300;flt('⚡ 速度提升！',e.x-camX,e.y,'#ffe000',18);}
      else{sk.shield=300;flt('🛡️ 護盾！',e.x-camX,e.y,'#00e5ff',18);}
      boom(e.x,e.y,e.kind==='speed'?'#ffe000':'#00e5ff',12);SFX.power();
      continue;
    }

    // — eatables —
    if(EAT_STAGE[e.t]==null)continue;           // not an eatable type
    const minStage=EAT_STAGE[e.t]??0;
    if(sk.stage<minStage)continue;              // shark too small
    if(d>=s.size*.88)continue;                  // not close enough to bite

    // FIX: per-entity bite cooldown prevents rapid-fire damage per frame
    if(sk.hitCD[e.id]>0)continue;
    sk.hitCD[e.id]=20; // ~0.33s between bites on same entity

    e.hp=(e.hp||1)-1;
    if(e.hp>0){
      // entity hurt but alive — show hit flash, no score yet
      SFX.bite();
      sparks(e.x,e.y,'rgba(255,255,255,.9)',4);
      shake(2);
      continue;
    }

    // — entity killed —
    e.alive=0;
    const big=(e.t==='whale'||e.t==='boat'||e.t==='boss');
    big?SFX.eatBig():SFX.eat();

    const pts=(e.sc||20)*multiplier;
    score+=pts;
    sk.hunger=Math.min(100,sk.hunger+(big?50:(e.sz||12)*.6));
    sk.hp=Math.min(sk.maxHp,sk.hp+(big?30:8));
    sk.evoPoints+=e.sc||20;
    totalEaten++;

    // combo
    combo++;comboT=90;
    if(combo>maxCombo)maxCombo=combo;
    if(combo>=3)SFX.combo(combo);
    if(combo>5){multiplier=Math.min(4,1+Math.floor(combo/5));multiTimer=120;}

    // mission tracking
    trackMission(e.t,1);
    trackMission('combo',combo); // update combo high-water mark

    // victory condition
    if(e.t==='boss'){bossDefeated=true;showVictory();return;}

    blood(e.x,e.y,e.col||'#ff2222');
    sparks(e.x,e.y,e.col||'#ffaa00',8);
    const lbl=(combo>=3?'×'+combo+' ':'')+pts+(multiplier>1?' ×'+multiplier+'倍':'');
    flt(lbl,e.x-camX,e.y,'#ffe000',17);
    if(big)shake(7);
    document.getElementById('comboDisp').textContent=combo>=3?'🔥 '+combo+'連擊！':'';

    // evolution
    if(sk.stage<SHARKS.length-1&&sk.evoPoints>=SHARKS[sk.stage+1].evoScore)evolve();
  }

  ents=ents.filter(e=>e.alive);
  maintain();

  // particles
  for(const p of parts){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.06*dt;p.life-=dt;p.a=Math.max(0,p.life/p.ml);}
  parts=parts.filter(p=>p.life>0);
  for(const b of bloods)b.a-=.0045*dt;
  bloods=bloods.filter(b=>b.a>0);
  for(const b of bgBubs){b.y+=b.vy*dt;if(b.y<SEA_Y)b.y=H-5;}
  floats=floats.filter(m=>m.life>0);
  for(const m of floats){m.y-=.9*dt;m.life-=dt;m.x+=(m.dx||0);}

  // — HUD update (once per frame) —
  updateHUD();
  renderMissions();
}

// ════════════════════════════════════
//  BOSS AI
// ════════════════════════════════════
function updateBoss(e,dt){
  e.shootTimer-=dt;
  e.chargeTimer-=dt;

  const[nx,ny]=norm(sk.x-e.x,sk.y-e.y);  // FIX: safe norm — no NaN when overlapping
  const dd=dst(e,sk);

  if(e.hp<=e.maxHp*.5&&e.phase===1){
    e.phase=2;flt('👹 Boss狂暴化！',W/2,H/2,'#ff4444',24);shake(18);SFX.boss();
  }
  const spd=e.phase===2?2.5:1.5;

  if(e.chargeState===1){
    e.vx+=nx*0.18*dt;e.vy+=ny*0.12*dt;
    if(dd<e.sz+SHARKS[sk.stage].size*1.2){e.chargeState=0;e.chargeTimer=rnd(80,150);}
  } else {
    if(dd>200){e.vx+=nx*.06*dt;e.vy+=ny*.04*dt;}
    if(e.chargeTimer<=0){
      e.chargeState=1;e.chargeTimer=180;
      flt('💨 Boss衝刺！',e.x-camX,e.y,'#ff4444',18);
    }
  }
  const ev=Math.sqrt(e.vx**2+e.vy**2);if(ev>spd){e.vx*=spd/ev;e.vy*=spd/ev;}
  e.x+=e.vx*dt;e.y+=e.vy*dt;
  e.fl=e.vx<0;
  e.x=Math.max(e.sz,Math.min(WORLD_W-e.sz,e.x));
  e.y=Math.max(SEA_Y+e.sz*.5,Math.min(H-e.sz*.5,e.y));

  if(e.shootTimer<=0){
    const cnt=e.phase===2?5:3;
    const baseAng=Math.atan2(sk.y-e.y,sk.x-e.x);
    for(let i=0;i<cnt;i++){
      const ang=baseAng+(i-(cnt-1)/2)*0.3;
      ents.push({id:eid(),t:'bul',x:e.x,y:e.y,vx:Math.cos(ang)*7,vy:Math.sin(ang)*7,sz:5,alive:1,life:130});
    }
    SFX.shoot();e.shootTimer=rnd(60,90);
  }
}

// ════════════════════════════════════
//  DAMAGE / FX HELPERS
// ════════════════════════════════════
function hurt(amt,msg,wx,wy){
  if(sk.shield>0){flt('🛡️ 格擋！',wx-camX,wy,'#00e5ff',15);return;}
  sk.hp=Math.max(0,sk.hp-amt);
  sk.invincible=60;sk.flashT=60;
  shake(amt*.3);
  combo=0;comboT=0;multiplier=1;multiTimer=0;
  document.getElementById('comboDisp').textContent='';
  // FIX: pass screen-x for flt
  flt(msg,wx-camX,wy,'#ff4444',16);
  sparks(sk.x,sk.y,'#ff2222',14);
  if(sk.hp<=0){sk.hp=0;SFX.death();endGame();return true;}
  return false;
}
function shake(m){shakeT=Math.min(shakeT+m*.32,12);}
function evolve(){
  sk.stage++;
  const s=SHARKS[sk.stage];
  sk.maxHp=s.maxHp;sk.hp=Math.min(sk.maxHp,sk.hp+80);
  SFX.evo();shake(22);
  boom(sk.x,sk.y,s.glow||'#00e5ff',45);
  boom(sk.x,sk.y,'#ffffff',22);
  const fl=document.getElementById('evoFlash');
  fl.style.background=s.glow||'#00e5ff';fl.style.opacity='.75';
  setTimeout(()=>{fl.style.transition='opacity .4s';fl.style.opacity='0';},80);
  flt('✨ 進化！'+s.name,W/2,H/2-40,'#00ffff',28);
  if(sk.stage===4)flt('⚡ 巨齒鯊！深海Boss即將現身…',W/2,H/2,'#ff88ff',19);
}
function sparks(wx,wy,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=rnd(1.5,5.5);
    parts.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,col,sz:rnd(2,6.5),life:rnd(20,48),ml:48,a:1});
  }
}
function boom(wx,wy,col,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=rnd(2.5,10);
    parts.push({x:wx,y:wy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,col,sz:rnd(3,11),life:rnd(28,58),ml:58,a:1});
  }
}
function blood(wx,wy,col){
  for(let i=0;i<7;i++){
    const a=Math.random()*Math.PI*2,r=rnd(5,24);
    bloods.push({x:wx+Math.cos(a)*r,y:wy+Math.sin(a)*r,r:rnd(4,16),col,a:rnd(.4,.7)});
  }
}
// flt: sx is SCREEN x, sy is WORLD y
function flt(text,sx,sy,col='#ffe000',sz=17){
  floats.push({text,x:sx,y:sy,life:65,ml:65,col,sz,dx:rnd(-.3,.3)});
}

// ════════════════════════════════════
//  HUD
// ════════════════════════════════════
function updateHUD(){
  const s=SHARKS[sk.stage];
  const hp=sk.hp/sk.maxHp*100;
  const hf=document.getElementById('hpFill');
  hf.style.width=hp+'%';
  hf.style.background=hp<25?'linear-gradient(90deg,#ff0000,#ff3300)':hp<50?'linear-gradient(90deg,#ff4400,#ff8800)':'linear-gradient(90deg,#ff2222,#ff8800)';
  document.getElementById('hungerFill').style.width=sk.hunger+'%';
  const multi=multiplier>1?' ×'+multiplier:'';
  document.getElementById('scoreDisp').textContent=score+multi;
  let lvlTxt=s.name;
  if(sk.shield>0)lvlTxt+=' 🛡️';
  else if(sk.speedBoost>0)lvlTxt+=' ⚡';
  document.getElementById('levelDisp').textContent=lvlTxt;

  const nx=sk.stage<SHARKS.length-1?SHARKS[sk.stage+1]:null;
  const evoFill=document.getElementById('evoFill');
  const evoLabel=document.getElementById('evoLabel');
  if(nx){
    evoFill.style.width=Math.min(100,sk.evoPoints/nx.evoScore*100)+'%';
    evoLabel.textContent='進化進度 → '+nx.name+' ('+Math.floor(sk.evoPoints)+'/'+nx.evoScore+')';
  } else if(!bossSpawned){
    evoFill.style.width='100%';
    evoLabel.textContent='⚠️ 巨齒鯊已覺醒！等待深海Boss…';
  } else {
    const boss=ents.find(e=>e.t==='boss'&&e.alive);
    if(boss){
      evoFill.style.width=(boss.hp/boss.maxHp*100)+'%';
      evoLabel.textContent='👹 深海霸主 HP: '+boss.hp+'/'+boss.maxHp;
    } else {
      evoFill.style.width='100%';
      evoLabel.textContent='🏆 稱霸海洋！';
    }
  }
  document.getElementById('depthMeter').textContent='深度 '+Math.max(0,Math.round((sk.y-SEA_Y)*.8))+'m';
}

// ════════════════════════════════════
//  DRAW
// ════════════════════════════════════
function draw(){
  // FIX: always clear full canvas first so shake-translate gaps don't show black
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#000a1a';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(shakeX,shakeY);

  // sky
  const sg=ctx.createLinearGradient(0,0,0,SEA_Y);
  sg.addColorStop(0,'#4faed4');sg.addColorStop(1,'#a0d4ee');
  ctx.fillStyle=sg;ctx.fillRect(0,0,W,SEA_Y);
  ctx.save();ctx.shadowColor='#ffee00';ctx.shadowBlur=45;ctx.fillStyle='#fff8b0';ctx.beginPath();ctx.arc(W-88,46,26,0,Math.PI*2);ctx.fill();ctx.restore();
  drawCloud(((180-(camX*.1))%W+W)%W,28,68);
  drawCloud(((420-(camX*.07))%W+W)%W,50,52);
  drawCloud(((680-(camX*.12))%W+W)%W,20,78);

  // ocean
  const og=ctx.createLinearGradient(0,SEA_Y,0,H);
  og.addColorStop(0,'#1a8cff');og.addColorStop(.3,'#0066cc');og.addColorStop(.7,'#003388');og.addColorStop(1,'#000e22');
  ctx.fillStyle=og;ctx.fillRect(0,SEA_Y,W,H-SEA_Y);

  // light rays
  ctx.save();ctx.globalAlpha=.03+Math.sin(gT*.03)*.015;
  for(let i=0;i<6;i++){const rx=(i*160+gT*.7)%W;ctx.fillStyle='#aadeff';ctx.beginPath();ctx.moveTo(rx,SEA_Y);ctx.lineTo(rx-35,H);ctx.lineTo(rx+35,H);ctx.closePath();ctx.fill();}
  ctx.restore();

  // bg bubbles
  ctx.save();
  for(const b of bgBubs){const bx=b.x-camX;if(bx<-10||bx>W+10)continue;ctx.globalAlpha=b.a;ctx.strokeStyle='rgba(160,220,255,.8)';ctx.lineWidth=.8;ctx.beginPath();ctx.arc(bx,b.y,b.sz,0,Math.PI*2);ctx.stroke();}
  ctx.restore();

  // waves
  ctx.save();ctx.strokeStyle='rgba(255,255,255,.4)';ctx.lineWidth=2;ctx.beginPath();
  for(let x=0;x<=W;x+=3){const wy=SEA_Y+Math.sin((x+camX*.4)/27+gT*.08)*3.5;x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);}ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.18)';ctx.lineWidth=1;ctx.beginPath();
  for(let x=0;x<=W;x+=3){const wy=SEA_Y+3+Math.sin((x+camX*.4)/19+gT*.11+1)*2;x===0?ctx.moveTo(x,wy):ctx.lineTo(x,wy);}ctx.stroke();ctx.restore();

  // floor
  ctx.fillStyle='#c8a46e';ctx.fillRect(0,H-16,W,16);
  ctx.fillStyle='#a08060';
  const fo=((-(camX%130))+130)%130;
  for(let rx=fo-65;rx<W+65;rx+=130){ctx.beginPath();ctx.ellipse(rx,H-16,26,15,0,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle='#1a8b1a';ctx.lineWidth=3;
  const wo=((-(camX%90))+90)%90;
  for(let rx=wo-30;rx<W+30;rx+=90){ctx.beginPath();ctx.moveTo(rx,H-16);ctx.bezierCurveTo(rx+14,H-30+Math.sin(gT*.09+rx*.01)*3,rx-10,H-44,rx+8,H-56+Math.sin(gT*.08)*4);ctx.stroke();}

  // blood splats
  ctx.save();ctx.translate(-camX,0);
  for(const b of bloods){if(b.x<camX-50||b.x>camX+W+50)continue;ctx.globalAlpha=b.a;ctx.fillStyle=b.col||'#cc0000';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();}
  ctx.restore();

  // entities
  ctx.save();ctx.translate(-camX,0);
  for(const e of ents){
    if(!e.alive||e.x<camX-150||e.x>camX+W+150)continue;
    drawEntity(e);
  }
  ctx.restore();

  // particles
  ctx.save();
  for(const p of parts){
    const px=p.x-camX;if(px<-20||px>W+20)continue;
    ctx.globalAlpha=p.a;ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=4;
    ctx.beginPath();ctx.arc(px,p.y,p.sz,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  drawShark();

  // shield ring
  if(sk.shield>0){
    ctx.save();ctx.globalAlpha=.3+Math.sin(gT*.2)*.1;ctx.strokeStyle='#00e5ff';ctx.lineWidth=3;ctx.shadowColor='#00e5ff';ctx.shadowBlur=15;
    ctx.beginPath();ctx.arc(sk.x-camX+shakeX,sk.y+shakeY,SHARKS[sk.stage].size*1.35,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  // speed glow
  if(sk.speedBoost>0){ctx.save();ctx.globalAlpha=.08+Math.sin(gT*.3)*.05;ctx.fillStyle='#ffe000';ctx.fillRect(0,0,W,H);ctx.restore();}

  // hunger warning
  if(warnF>0){ctx.save();ctx.globalAlpha=Math.abs(Math.sin(warnF))*.2;ctx.fillStyle='#ff8800';ctx.fillRect(0,0,W,H);ctx.restore();}
  // damage flash
  if(sk.flashT>0&&Math.floor(sk.flashT/4)%2===0){ctx.save();ctx.globalAlpha=.18;ctx.fillStyle='#ff0000';ctx.fillRect(0,0,W,H);ctx.restore();}

  // deep vignette
  const vg=ctx.createRadialGradient(W/2,H,80,W/2,H,H-SEA_Y+50);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,20,.55)');
  ctx.fillStyle=vg;ctx.fillRect(0,SEA_Y,W,H-SEA_Y);

  // float texts (screen-space x already)
  for(const m of floats){
    ctx.save();ctx.globalAlpha=Math.min(1,m.life/m.ml*2);
    ctx.font='bold '+(m.sz||17)+'px Noto Sans TC,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.strokeStyle='rgba(0,0,0,.85)';ctx.lineWidth=4;ctx.strokeText(m.text,m.x,m.y);
    ctx.fillStyle=m.col||'#ffe000';ctx.fillText(m.text,m.x,m.y);
    ctx.restore();
  }

  ctx.restore(); // end shake
}

function drawCloud(x,y,w){
  ctx.save();ctx.fillStyle='rgba(255,255,255,.83)';
  ctx.beginPath();ctx.ellipse(x,y,w,18,0,0,Math.PI*2);ctx.ellipse(x-w*.3,y+8,w*.6,13,0,0,Math.PI*2);ctx.ellipse(x+w*.35,y+7,w*.55,12,0,0,Math.PI*2);ctx.fill();ctx.restore();
}

// ════════════════════════════════════
//  ENTITY DRAWING
// ════════════════════════════════════
function drawEntity(e){
  ctx.save();
  const{x,y,sz,aT}=e;
  switch(e.t){
    case 'fish':{
      const dir=e.vx<0?-1:1;
      ctx.save();ctx.translate(x,y);if(dir===-1)ctx.scale(-1,1);
      ctx.fillStyle=e.col;ctx.beginPath();ctx.ellipse(0,0,sz,sz*.52,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-sz*.7,-sz*.44);ctx.lineTo(-sz-sz*.7,sz*.44);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.45,-sz*.15,sz*.18,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sz*.48,-sz*.15,sz*.09,0,Math.PI*2);ctx.fill();
      ctx.restore();break;
    }
    case 'jelly':{
      const p=Math.sin(aT*2)*.12+1;
      ctx.save();ctx.translate(x,y);
      ctx.fillStyle='rgba(255,80,200,.55)';ctx.strokeStyle='rgba(255,160,230,.9)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.ellipse(0,0,sz*p,sz*.6,0,0,Math.PI);ctx.fill();ctx.stroke();
      ctx.strokeStyle='rgba(255,100,210,.35)';ctx.lineWidth=1;
      for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(i*sz*.2,0);ctx.quadraticCurveTo(i*sz*.28,sz*.85+Math.sin(aT+i)*4,i*sz*.14,sz*1.4);ctx.stroke();}
      ctx.restore();break;
    }
    case 'crab':{
      ctx.save();ctx.translate(x,y);ctx.fillStyle='#dd3300';
      ctx.beginPath();ctx.ellipse(0,0,16,10,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#bb2200';ctx.beginPath();ctx.ellipse(-19,-3,7,5,-.35,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(19,-3,7,5,.35,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#cc2200';ctx.lineWidth=2;
      [-10,-4,4,10].forEach(ox=>{ctx.beginPath();ctx.moveTo(ox,4);ctx.lineTo(ox+ox*.7,13+Math.sin(aT+ox)*2);ctx.stroke();});
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(-5,-6,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(5,-6,2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();break;
    }
    case 'turtle':{
      ctx.save();ctx.translate(x,y);ctx.fillStyle='#1a7a1a';ctx.beginPath();ctx.ellipse(0,0,22,16,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#0f5010';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,-16);ctx.lineTo(0,16);ctx.stroke();ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(22,0);ctx.stroke();
      ctx.fillStyle='#7a5030';ctx.beginPath();ctx.ellipse(25,-2,7,5,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#556b2f';
      [-10,10].forEach(oy=>{ctx.beginPath();ctx.ellipse(-27,oy,6,4,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(27,oy,5,4,0,0,Math.PI*2);ctx.fill();});
      ctx.restore();break;
    }
    case 'octo':{
      ctx.save();ctx.translate(x,y);ctx.fillStyle='#cc4488';ctx.beginPath();ctx.ellipse(0,0,sz*.54,sz*.5,0,0,Math.PI*2);ctx.fill();
      for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2,l=sz*.72+Math.sin(aT+i)*sz*.14;ctx.strokeStyle='#aa3366';ctx.lineWidth=sz*.11;ctx.beginPath();ctx.moveTo(Math.cos(a)*sz*.38,Math.sin(a)*sz*.33);ctx.quadraticCurveTo(Math.cos(a+.3)*l*.7,Math.sin(a+.3)*l*.7,Math.cos(a+.2)*l,Math.sin(a+.2)*l);ctx.stroke();}
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(-sz*.17,-sz*.11,sz*.14,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sz*.17,-sz*.11,sz*.14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-sz*.17,-sz*.11,sz*.07,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(sz*.17,-sz*.11,sz*.07,0,Math.PI*2);ctx.fill();
      ctx.restore();break;
    }
    case 'eshark':{
      const dir=e.fl?-1:1;
      ctx.save();ctx.translate(x,y);if(dir===-1)ctx.scale(-1,1);
      ctx.fillStyle='#4477cc';ctx.beginPath();ctx.ellipse(0,0,sz,sz*.44,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-sz*.65,-sz*.5);ctx.lineTo(-sz-sz*.65,sz*.5);ctx.closePath();ctx.fillStyle='#3366bb';ctx.fill();
      ctx.fillStyle='#4477cc';ctx.beginPath();ctx.moveTo(-sz*.1,-sz*.4);ctx.lineTo(sz*.14,-sz*.95);ctx.lineTo(sz*.44,-sz*.4);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.6,-sz*.08,sz*.14,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sz*.63,-sz*.08,sz*.07,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff3333';ctx.beginPath();ctx.arc(sz*.86,sz*.07,sz*.18,0,Math.PI);ctx.fill();
      ctx.fillStyle='#fff';
      for(let t=0;t<3;t++){const tx=sz*.74+t*sz*.1;ctx.beginPath();ctx.moveTo(tx,sz*.07);ctx.lineTo(tx+sz*.05,sz*.22);ctx.lineTo(tx+sz*.1,sz*.07);ctx.closePath();ctx.fill();}
      ctx.restore();break;
    }
    case 'whale':{
      const dir2=e.vx<0?-1:1;
      ctx.save();ctx.translate(x,y);if(dir2===-1)ctx.scale(-1,1);
      ctx.fillStyle='#2255aa';ctx.beginPath();ctx.ellipse(0,0,sz,sz*.42,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#aaccff';ctx.beginPath();ctx.ellipse(sz*.05,sz*.18,sz*.7,sz*.22,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#2255aa';ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-sz*.45,-sz*.55);ctx.lineTo(-sz-sz*.45,sz*.55);ctx.closePath();ctx.fill();
      ctx.fillStyle='#1a4499';ctx.beginPath();ctx.moveTo(-sz*.2,-sz*.38);ctx.lineTo(-sz*.05,-sz*.8);ctx.lineTo(sz*.15,-sz*.38);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.72,-sz*.1,sz*.1,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sz*.74,-sz*.1,sz*.05,0,Math.PI*2);ctx.fill();
      if(Math.sin(aT*.5)>.78){ctx.strokeStyle='rgba(180,230,255,.7)';ctx.lineWidth=2;for(let i=-2;i<=2;i++){ctx.beginPath();ctx.moveTo(sz*.2,i*sz*.05-sz*.42);ctx.lineTo(sz*.2+i*sz*.1,-sz*.72-Math.random()*sz*.18);ctx.stroke();}}
      ctx.restore();break;
    }
    case 'boat':{
      ctx.save();ctx.translate(x,y);
      ctx.fillStyle='#cc4400';ctx.beginPath();ctx.moveTo(-50,0);ctx.lineTo(50,0);ctx.lineTo(40,18);ctx.lineTo(-40,18);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.fillRect(-35,-22,70,22);
      ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;ctx.strokeRect(-35,-22,70,22);
      ctx.fillStyle='#aaddff';ctx.beginPath();ctx.arc(-15,-11,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(15,-11,5,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-22);ctx.lineTo(0,-58);ctx.stroke();
      ctx.fillStyle='#ff3300';ctx.beginPath();ctx.moveTo(0,-58);ctx.lineTo(25,-46);ctx.lineTo(0,-38);ctx.closePath();ctx.fill();
      if(Math.random()<.04){ctx.fillStyle='#ff8800';ctx.shadowColor='#ff8800';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(52,5,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
      ctx.restore();break;
    }
    case 'human':{
      ctx.save();ctx.translate(x,y);
      ctx.fillStyle=e.arm?'#883300':'#dd8800';ctx.beginPath();ctx.ellipse(0,6,7,10,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ffcc88';ctx.beginPath();ctx.arc(0,-8,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#441100';ctx.beginPath();ctx.arc(0,-12,8,Math.PI,2*Math.PI);ctx.fill();
      ctx.strokeStyle=e.arm?'#883300':'#dd8800';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(-7,2);ctx.lineTo(-16,-4+Math.sin(aT*3)*6);ctx.stroke();
      ctx.beginPath();ctx.moveTo(7,2);ctx.lineTo(16,-4+Math.sin(aT*3+1)*6);ctx.stroke();
      if(e.arm){
        ctx.fillStyle='#444';ctx.fillRect(12,-7,16,4);
        if(Math.random()<.05){ctx.fillStyle='#ff8800';ctx.shadowColor='#ff8800';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(28,-5,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
      }
      if(!e.arm&&Math.sin(aT)>.5){ctx.fillStyle='#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('！！',0,-22);}
      // HP indicator for armed humans
      if(e.arm&&e.hp>0){
        ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(-8,-28,16,4);
        ctx.fillStyle='#ff4444';ctx.fillRect(-8,-28,16*(e.hp/3),4);
      }
      ctx.restore();break;
    }
    case 'bomb':{
      ctx.save();ctx.translate(x,y);
      ctx.shadowColor='#ff4400';ctx.shadowBlur=6+Math.sin(aT*3)*5;
      ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#555';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,13,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
      ctx.strokeStyle='#777';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-13);ctx.quadraticCurveTo(9,-22,6,-27);ctx.stroke();
      if(Math.sin(aT*4)>.28){ctx.fillStyle='#ff8800';ctx.shadowColor='#ff8800';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(6,-27,4,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffe000';ctx.beginPath();ctx.arc(6,-27,2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
      ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('☠',0,1);
      ctx.restore();break;
    }
    case 'trash':{
      ctx.save();ctx.translate(x,y);ctx.rotate(Math.sin(aT*.5)*.2);
      ctx.fillStyle=e.col;ctx.globalAlpha=.85;ctx.fillRect(-sz/2,-sz/2,sz,sz*1.2);
      ctx.globalAlpha=1;ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=1.5;ctx.strokeRect(-sz/2,-sz/2,sz,sz*1.2);
      ctx.fillStyle='rgba(0,0,0,.25)';ctx.font=(sz*.8)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🗑',0,sz*.1);
      ctx.restore();break;
    }
    case 'bul':{
      ctx.save();ctx.shadowColor='#ffaa00';ctx.shadowBlur=12;ctx.fillStyle='#ffe000';
      ctx.beginPath();ctx.arc(e.x,e.y,e.sz||4,0,Math.PI*2);ctx.fill();ctx.restore();break;
    }
    case 'coin':{
      ctx.save();ctx.translate(x,y);
      const spin=Math.cos(aT*3);
      ctx.fillStyle='#ffd700';ctx.shadowColor='#ffd700';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,0,sz*Math.abs(spin)+.5,sz,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.7)';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('$',0,0);
      ctx.restore();break;
    }
    case 'power':{
      ctx.save();ctx.translate(x,y);ctx.rotate(e.aT2||0);
      const pc=e.kind==='speed'?'#ffe000':'#00e5ff';
      ctx.strokeStyle=pc;ctx.shadowColor=pc;ctx.shadowBlur=14;ctx.lineWidth=2.5;
      for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*sz,Math.sin(a)*sz);ctx.stroke();}
      ctx.fillStyle=pc;ctx.shadowBlur=0;ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(e.kind==='speed'?'⚡':'🛡',0,1);
      ctx.restore();break;
    }
    case 'boss': drawBoss(e);break;
  }
  ctx.restore();
}

// ════════════════════════════════════
//  BOSS DRAWING
// ════════════════════════════════════
function drawBoss(e){
  const{x,y,sz,aT,phase,hp,maxHp}=e;
  const dir=e.fl?-1:1;
  ctx.save();ctx.translate(x,y);if(dir===-1)ctx.scale(-1,1);
  const rc=phase===2?'#ff4400':'#880000';
  ctx.save();ctx.shadowColor=rc;ctx.shadowBlur=25+Math.sin(gT*.15)*10;
  ctx.strokeStyle=rc;ctx.lineWidth=3;ctx.globalAlpha=.5+Math.sin(gT*.15)*.25;
  ctx.beginPath();ctx.ellipse(0,0,sz*1.15,sz*.55,0,0,Math.PI*2);ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#330000';ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-sz*.8,-sz*.6);ctx.lineTo(-sz-sz*.8,sz*.6);ctx.closePath();ctx.fill();
  ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=18;
  ctx.fillStyle=phase===2?'#550000':'#220011';ctx.beginPath();ctx.ellipse(0,0,sz,sz*.47,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle='#cc2244';ctx.beginPath();ctx.ellipse(sz*.05,sz*.15,sz*.6,sz*.23,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=phase===2?'#880000':'#550000';
  ctx.beginPath();ctx.moveTo(-sz*.1,-sz*.44);ctx.lineTo(sz*.05,-sz*1.2);ctx.lineTo(sz*.2,-sz*.6);ctx.lineTo(sz*.3,-sz*1.0);ctx.lineTo(sz*.44,-sz*.44);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(sz*.08,sz*.18);ctx.lineTo(sz*.06,sz*.9);ctx.lineTo(sz*.65,sz*.4);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,100,100,.4)';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-sz*.2,-sz*.2);ctx.lineTo(sz*.1,sz*.1);ctx.stroke();ctx.beginPath();ctx.moveTo(sz*.2,-sz*.3);ctx.lineTo(sz*.4,-sz*.1);ctx.stroke();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.62,-sz*.1,sz*.16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ff0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=12;ctx.beginPath();ctx.arc(sz*.65,-sz*.1,sz*.1,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.save();ctx.translate(sz*.88,sz*.06);
  ctx.fillStyle='#aa0000';ctx.beginPath();ctx.arc(0,0,sz*.25,.1,Math.PI-.1);ctx.fill();
  ctx.fillStyle='#fffff0';
  for(let t=0;t<8;t++){const tx=-sz*.2+t*sz*.06;ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx+sz*.03,sz*.22);ctx.lineTo(tx+sz*.06,0);ctx.closePath();ctx.fill();}
  ctx.restore(); // restore mouth translate
  ctx.restore(); // restore body translate+flip

  // HP bar: drawn in world-space (caller already did translate(-camX,0)),
  // so use x directly — no camX subtraction needed here
  const barW=sz*2;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(x-barW/2,y-sz*.65-14,barW,10);
  ctx.fillStyle=hp/maxHp>.5?'#ff4400':'#ff0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=6;
  ctx.fillRect(x-barW/2,y-sz*.65-14,barW*(hp/maxHp),10);ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(255,100,100,.6)';ctx.lineWidth=1.5;ctx.strokeRect(x-barW/2,y-sz*.65-14,barW,10);
  ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('👹 深海霸主',x,y-sz*.65-20);
  ctx.restore();
}

// ════════════════════════════════════
//  SHARK DRAWING
// ════════════════════════════════════
function drawShark(){
  const s=SHARKS[sk.stage],sz=s.size;
  const sx=sk.x-camX+shakeX,sy=sk.y+shakeY,dir=sk.facingLeft?-1:1;
  ctx.save();ctx.translate(sx,sy);if(dir===-1)ctx.scale(-1,1);
  if(s.glow){
    ctx.save();const p=.38+Math.sin(gT*.12)*.2;
    ctx.shadowColor=s.glow;ctx.shadowBlur=32+p*22;ctx.strokeStyle=s.glow;ctx.lineWidth=2.5;ctx.globalAlpha=p;
    ctx.beginPath();ctx.ellipse(0,0,sz*1.12,sz*.6,0,0,Math.PI*2);ctx.stroke();ctx.restore();
  }
  ctx.fillStyle=s.color;
  ctx.beginPath();ctx.moveTo(-sz,0);ctx.lineTo(-sz-sz*.72,-sz*.55+sk.tailA*sz*.6);ctx.lineTo(-sz-sz*.72,sz*.55+sk.tailA*sz*.6);ctx.closePath();ctx.fill();
  ctx.shadowColor='rgba(0,0,0,.35)';ctx.shadowBlur=14;ctx.fillStyle=s.color;
  ctx.beginPath();ctx.ellipse(0,0,sz,sz*.47,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  ctx.fillStyle=s.belly||'rgba(255,255,255,.25)';ctx.beginPath();ctx.ellipse(sz*.08,sz*.14,sz*.62,sz*.24,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.globalAlpha=.07;ctx.strokeStyle='#000';ctx.lineWidth=.8;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(-sz*.2+i*sz*.4,0,sz*.22,0,Math.PI*2);ctx.stroke();}ctx.restore();
  ctx.fillStyle=s.color;ctx.beginPath();ctx.moveTo(-sz*.12,-sz*.44);ctx.lineTo(sz*.12,-sz*1.08);ctx.lineTo(sz*.44,-sz*.44);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(sz*.08,sz*.18);ctx.lineTo(sz*.06,sz*.88);ctx.lineTo(sz*.62,sz*.38);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sz*.62,-sz*.1,sz*.16,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=sk.invincible>0?'#ff0000':'#111';ctx.beginPath();ctx.arc(sz*.65,-sz*.1,sz*.09,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.beginPath();ctx.arc(sz*.67,-sz*.14,sz*.04,0,Math.PI*2);ctx.fill();
  const mo=sk.mouthOpen;
  ctx.save();ctx.translate(sz*.88,sz*.06);
  ctx.fillStyle='#dd2222';ctx.beginPath();ctx.arc(0,0,sz*.23,mo*.22,Math.PI-mo*.22);ctx.fill();
  ctx.fillStyle='#fffff0';const tc=Math.min(3+sk.stage,7),mw=sz*.4;
  for(let t=0;t<tc;t++){
    const tx=-mw/2+t*(mw/(tc-1||1)),ty=mo*sz*.2;
    ctx.beginPath();ctx.moveTo(tx,0);ctx.lineTo(tx+sz*.05,sz*.2+ty);ctx.lineTo(tx+sz*.1,0);ctx.closePath();ctx.fill();
  }
  ctx.restore();ctx.restore();
  // bubble trail
  if(Math.random()<.18){
    const v=Math.sqrt(sk.vx**2+sk.vy**2);
    parts.push({x:sk.x-dir*sz*.9+rnd(-sz*.25,sz*.25),y:sk.y+rnd(-sz*.2,sz*.2),vx:rnd(-.3,.3)-dir*v*.1,vy:rnd(-1.4,-.4),col:'rgba(190,225,255,.5)',sz:rnd(2,5),life:rnd(18,36),ml:36,a:1});
  }
}

// ════════════════════════════════════
//  VICTORY
// ════════════════════════════════════
function showVictory(){
  running=false;if(score>highScore)highScore=score;
  SFX.victory();
  const vc=document.getElementById('vCanvas');
  const vCtx=vc.getContext('2d');
  let vT=0;const vParts=[];
  function addFW(){
    const cx=rnd(20,260),cy=rnd(10,90),col='hsl('+ri(0,360)+',100%,65%)';
    for(let i=0;i<28;i++){const a=i/28*Math.PI*2,sp=rnd(1,5);vParts.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,col,life:rnd(28,55),ml:55});}
  }
  addFW();addFW();addFW();
  const stars=score>8000?'⭐⭐⭐':score>4000?'⭐⭐':'⭐';
  const mins=Math.floor(gT/60),secs=Math.floor(gT%60);
  document.getElementById('vStars').textContent=stars;
  document.getElementById('vDesc').innerHTML='你進化成史前最強掠食者<b style="color:#ff88ff">巨齒鯊</b>，<br>並擊敗了神秘的<b style="color:#ff4444">深海霸主</b>！<br>海洋從此臣服於你的恐怖統治。';
  document.getElementById('vStatBlock').innerHTML=`
    <div class="vStat">最終分數：<b>${score}</b></div>
    <div class="vStat">歷史最高：<b>${highScore}</b></div>
    <div class="vStat">遊戲時間：<b>${mins}:${String(secs).padStart(2,'0')}</b></div>
    <div class="vStat">總吞噬數：<b>${totalEaten}</b></div>
    <div class="vStat">最高連擊：<b>${maxCombo}</b></div>
    <div class="vStat">評價：<b style="color:${stars.length>4?'#ffe000':'#aef'}">${stars.length>4?'🔱 傳奇霸主':stars.length>1?'🌊 海洋之王':'🦈 稱霸完成'}</b></div>
  `;
  document.getElementById('victoryOverlay').style.display='flex';
  function animFW(){
    vCtx.fillStyle='rgba(0,0,20,.3)';vCtx.fillRect(0,0,280,100);
    for(const p of vParts){p.x+=p.vx;p.y+=p.vy;p.vy+=.05;p.life--;const pa=p.life/p.ml;vCtx.save();vCtx.globalAlpha=pa;vCtx.fillStyle=p.col;vCtx.shadowColor=p.col;vCtx.shadowBlur=4;vCtx.beginPath();vCtx.arc(p.x,p.y,2.5,0,Math.PI*2);vCtx.fill();vCtx.restore();}
    vParts.splice(0,vParts.length,...vParts.filter(p=>p.life>0));
    vT++;if(vT%40===0)addFW();
    if(document.getElementById('victoryOverlay').style.display!=='none')requestAnimationFrame(animFW);
  }
  animFW();
}

// ════════════════════════════════════
//  GAME OVER
// ════════════════════════════════════
function endGame(){
  running=false;if(score>highScore)highScore=score;
  const mins=Math.floor(gT/60),secs=Math.floor(gT%60);
  const doneCount=missions.filter(m=>m.done).length;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <div class="ovTitle" style="color:#ff3333;animation:none;font-size:clamp(22px,5vw,38px)">💀 遊戲結束</div>
    <div class="sub" style="font-size:clamp(14px,3vw,20px)">最終分數：${score}</div>
    <div class="statGrid">
      <span class="sl">進化達到</span><span class="sv">${SHARKS[sk.stage].name}</span>
      <span class="sl">遊戲時間</span><span class="sv">${mins}:${String(secs).padStart(2,'0')}</span>
      <span class="sl">總吞噬數</span><span class="sv">${totalEaten}</span>
      <span class="sl">最高連擊</span><span class="sv">${maxCombo}</span>
      <span class="sl">任務完成</span><span class="sv">${doneCount}/3</span>
      <span class="sl">最高紀錄</span><span class="sv">${highScore}</span>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
      <button class="btn" onclick="startGame()">▶ 再玩一次</button>
      <button class="btn red" onclick="showMainMenu()">🏠 主選單</button>
    </div>
  `;
  ov.style.display='flex';
}

// ════════════════════════════════════
//  INPUT
// ════════════════════════════════════
document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// D-pad
(function setupDpad(){
  const map={'dpad-up':'dU','dpad-down':'dD','dpad-left':'dL','dpad-right':'dR'};
  for(const[id,k] of Object.entries(map)){
    const btn=document.getElementById(id);
    if(!btn)continue;
    ['touchstart','mousedown'].forEach(ev=>btn.addEventListener(ev,e=>{if(keys)keys[k]=true;btn.classList.add('pressed');e.preventDefault();},{passive:false}));
    ['touchend','mouseup','touchcancel','mouseleave'].forEach(ev=>btn.addEventListener(ev,e=>{if(keys)keys[k]=false;btn.classList.remove('pressed');e.preventDefault();},{passive:false}));
  }
})();

// Touch joystick (when dpad not visible)
let tsStart=null;
canvas.addEventListener('touchstart',e=>{
  if(document.getElementById('dpad').style.display==='block')return;
  tsStart={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!tsStart||!keys)return;
  const dx=(e.touches[0].clientX-tsStart.x)/SCALE,dy=(e.touches[0].clientY-tsStart.y)/SCALE;
  keys['ArrowLeft']=dx<-15;keys['ArrowRight']=dx>15;keys['ArrowUp']=dy<-15;keys['ArrowDown']=dy>15;
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{
  tsStart=null;
  if(keys)['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].forEach(k=>keys[k]=false);
});

// Init high score display
document.getElementById('hsDisp').textContent='';
</script>
